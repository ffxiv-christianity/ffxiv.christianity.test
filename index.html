<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 基督教公會 | 艾歐澤亞的團契</title>
    <style>
        /* 移除預設的邊距，讓內容完全貼合螢幕邊緣 */
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            /* 防止全螢幕狀態下出現捲動條 */
            background-color: #ffffff;
            /* 圖片載入前顯示白色底 */
        }

        /* 容器設定 */
        .entry-link {
            display: block;
            width: 100vw;
            height: 100vh;
            position: relative;
            /* 讓子元素可以絕對定位 */
            overflow: hidden;
            cursor: pointer;
            background-color: #000;
        }

        /* 後面圖層：背景板 */
        .back-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/大聖堂1.jpg');
            background-size: cover;
            background-position: center;

            /* 這裡控制透明度與模糊感 */
            opacity: 0.65;
            /* 調整透明度，讓它隱隱約約 */
            filter: blur(10px) brightness(0.8);;
            /* 加上模糊，讓背景不搶戲 */
            transform: scale(1.1);
            /* 稍微放大一點點，避免邊緣出現白邊 */

            z-index: 1;
        }

        /* 前面圖層：主角 */
        .front-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            /* 確保在背景上面 */
        }

        .front-layer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* 核心：保證圖片完整 */

            /* 你原本想要的淡入動畫 */
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(1.05);
            }

            /* 加入輕微縮放，更有層次感 */
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <a href="home.html" class="entry-link">
        <div class="back-layer"></div>

        <div class="front-layer">
            <img src="images/大聖堂1.jpg" alt="FF14 基督教公會 入口大圖">
        </div>
    </a>
</body>

</html>
