<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 基督教公會 | 艾歐澤亞的團契</title>
    <style>
        /* 移除預設的邊距，讓內容完全貼合螢幕邊緣 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 防止全螢幕狀態下出現捲動條 */
            background-color: #000; /* 圖片載入前顯示黑色底 */
        }

        /* 將超連結撐滿整個螢幕，並設定游標為手指形狀 */
        .entry-link {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* 關鍵：讓圖片自動適應螢幕大小 */
        .entry-link img {
            width: 100%;
            height: 100%;
            /* object-fit: cover 是 HTML <img> 版的 background-size: cover */
            /* 讓圖片等比例縮放填滿，多餘的部分會被裁切，保證不變形 */
            object-fit: cover; 
            object-position: center; /* 圖片始終置中對齊 */
            
            /* 可選：加上一個淡入的過場動畫，看起來更高級 */
            animation: fadeIn 2s;
        }

        /* 定義淡入動畫 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <a href="home.html" class="entry-link">
        <img src="images/大聖堂1.jpg" alt="FF14 基督教公會 入口大圖">
    </a>
</body>
</html>
