    <script>
        let currentSlideIndex = 0;

        function showSlider(sliderId) {
            // 隱藏所有組別並移除按鈕高亮
            const groups = document.querySelectorAll('.slider-group');
            groups.forEach(g => g.classList.remove('active'));

            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));

            // 顯示指定的組別
            const target = document.getElementById(sliderId);
            if (target) {
                target.classList.add('active');

                // 重置索引與捲動位置
                currentSlideIndex = 0;
                const container = target.querySelector('.slider-container');
                if (container) {
                    container.scrollLeft = 0;
                }
            }

            // 讓點擊的那個按鈕變色
            if (window.event && window.event.currentTarget) {
                window.event.currentTarget.classList.add('active');
            } else if (typeof event !== 'undefined' && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
        }

        // 2. 輪播器控制
        function moveSlide(sliderId, direction) {
            const container = document.querySelector(`#${sliderId} .slider-container`);
            if (!container) return;

            const items = container.querySelectorAll('.item');
            const totalSlides = items.length;

            currentSlideIndex += direction;

            if (currentSlideIndex >= totalSlides) {
                currentSlideIndex = 0;
            } else if (currentSlideIndex < 0) {
                currentSlideIndex = totalSlides - 1;
            }

            const targetLeft = container.clientWidth * currentSlideIndex;

            container.scrollTo({
                left: targetLeft,
                behavior: 'smooth'
            });
        }

        // 開啟放大檢視
        function openLightbox(imgElement) {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");

            lightbox.style.display = "flex"; // 顯示彈窗
            lightboxImg.src = imgElement.src; // 將點擊的圖片路徑傳給彈窗
        }

        // 關閉放大檢視
        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
        }
    </script>
